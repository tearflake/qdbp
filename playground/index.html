<script>
    let globalMagn = 1;
    function getRaster (quant, color1, color2) {
        var cnv = document.createElement ("canvas");
        var pr = Math.min (window.devicePixelRatio, 3);
        var ps = Math.round (quant / 100 * 4 * Math.max (screen.width, 1920) / 1920);
        
        if (ps < pr)
            ps = pr;
        
        ps = 3;
        
        cnv.width = ps * 2;
        cnv.height = ps * 2;
        var ctx = cnv.getContext('2d');
        ctx.fillStyle = "rgb(255,255,255)";
        ctx.fillStyle = color1;
        ctx.fillRect (0, 0, ps, ps);
        ctx.fillRect (ps, ps, ps, ps);
        ctx.fillStyle = "rgb(0,0,0)";
        ctx.fillStyle = color2;
        ctx.fillRect (0, ps, ps, ps);
        ctx.fillRect (ps, 0, ps, ps);
        
        var img = document.createElement ("img");
        img.src = cnv.toDataURL('image/png');
        
        return img;
    }
    
    var img = getRaster (75, "rgb(0,0,0)", "rgb(255,255,255)");
    document.getElementById ("wrapper").style.background = "url('" + img.src + "') top left repeat";

    function getCoords (text, offset) {
        var i, ch, row = 1, col = 1;
        if (text.length > 0)
            for (i = 0; i < offset; i += 1) {
                ch = text.charCodeAt(i);
                if (ch === 13 || ch === 10) {
                    if (ch === 13 && text.charCodeAt (i + 1) === 10)
                        i += 1;

                    row += 1;
                    col = 1;
                    
                } else
                  col += 1;
            }
        
        return {row: row, column: col};
    }

    function populate (param) {
        input1.setValue (
`

    .module

      ..fn
        ...square

            (* x x))
            
      ..fn
        ...distance
        ...(lambda (x y)
            (sqrt (+ (* x x) (* y y))))
            
      ..export
        ...square
        ...distance
        
    .module
      ..square
        
      ..fn
        ...area
        ...(lambda (a)
        (math/square a))
            
      ..fn
        ...diagonal
        ...(lambda (a)
            (math/distance a a))
            
      ..export
        ...area
        ...diagonal
)
`
        );
        

        input1.setValue (
`
package
   .shapes

   .module
      ..math

      ..fn
         ...square
         ...(lambda (x)
             (* x x))

      ..fn
         ...distance
         ...(lambda (x y)
             (sqrt (+ (* x x) (* y y))))
`
        );

        output1.value = "";
        document.getElementById("tm").innerHTML = "";
        setTimeout(function() {
            output1.selectionStart = 0;
            output1.selectionEnd = 0;
            input1.setFocus ();
            input1.setSelectionStart (0);
            input1.setSelectionEnd (0);
            input1.setScrollTop(0);
        }, 0);
    }

    populate ('example-test');
</script>

<script>
    function process () {
        output1.value = "";
        //document.getElementById("tm").innerHTML = "(parsing dp-expr...)";
        setTimeout (function (){
            var tm = Date.now ();
            try {
                output1.wrap = "off";
                var output = QDBP.compile (input1.getValue ());
            
                output = SExpr.parse (output);
                if (output.err) {
                    output1.value = "parsing:\n" + output.err + " at " + "(" + (output.pos.y + 1) + ", " + (output.pos.x + 1) + ")";
                    document.getElementById("tm").innerHTML = "";
                } else {
                    var sparsed = (Date.now () - tm)
                    //document.getElementById("tm").innerHTML = "(converting dp-expr to s-expr took " + sparsed + "ms)";
                    output1.value = SExpr.stringify (output);
                }
            }
            catch(e) {
                output1.wrap = "hard";
                output1.value = e.name + ":\n" + e.message;
            }
            output1.selectionStart = 0;
            output1.selectionEnd = 0;
        }, 0);
    }
</script>
